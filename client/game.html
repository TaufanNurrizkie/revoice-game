<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE:VOICE — Game</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
  <div id="stage">
    <div id="hud">
      <div class="hud-pill"><span>&#10084;&#65039;</span><span id="hud-heart-val">3</span></div>
      <div class="hud-pill"><span>&#11088;</span><span id="hud-star-val">0</span></div>
      <div class="hud-pill"><span>&#9201;&#65039;</span><span id="hud-timer-val">0</span>s</div>
      <div class="hud-pill"><span>&#127919;</span>Babak <span id="hud-babak">1</span></div>
    </div>

    <div id="babak2-question" style="display: none; background: #2a4135; color: #f0c468; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; border: 2px solid #3a5a45; border-radius: 8px; margin-bottom: 8px;"></div>
    <canvas id="game" width="462" height="418"></canvas>

    <div id="banner-status">Bersiap...</div>
    <button id="btn-submit" disabled>Submit Kata di Lubang Ini</button>

    <div id="popup-transition" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 320px; background: #2a4135; padding: 20px; border: 3px solid #e08a3c; border-radius: 12px; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; box-shadow: 0 8px 16px rgba(0,0,0,0.5);">
      <h2 id="popup-transition-title" style="color: #8fd93f; margin-top: 0; margin-bottom: 10px; font-size: 20px;">Babak Selesai!</h2>
      <p id="popup-transition-desc" style="font-size: 14px; margin: 0;">Hebat! Anda telah menyelesaikan babak ini.</p>
      <button id="btn-lanjut" style="margin-top: 15px; width: 100%; padding: 10px; font-size: 14px; font-weight: bold; background: #e08a3c; color: #1c2b24; border: none; border-radius: 8px; cursor: pointer;">Lanjut ke Babak Berikutnya</button>
    </div>

    <div id="popup-alert" style="display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #d9534f; color: white; padding: 8px 16px; border-radius: 20px; z-index: 200; font-weight: bold; font-size: 13px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
      <span id="popup-alert-msg">Pesan</span>
    </div>
  </div>

  <div id="controls-hint">
    Gerak: <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> /
    WASD &middot;
    Submit: <span class="key">Spasi</span> / tombol di bawah
  </div>

  <script src="js/maze.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/player.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/babak1.js"></script>
  <script src="js/babak2.js"></script>
  <script src="js/babak3.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
